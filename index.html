<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hackin'</title>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #2b6c74;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas></canvas>

    <script>
      var canvas = document.getElementsByTagName('canvas')[0];
      var ctx = canvas.getContext('2d', { alpha: false });

      var dpr = window.devicePixelRatio || 1;
      var bsr =
        ctx.webkitBackingStorePixelRatio ||
        ctx.mozBackingStorePixelRatio ||
        ctx.msBackingStorePixelRatio ||
        ctx.oBackingStorePixelRatio ||
        ctx.backingStorePixelRatio ||
        1;

      var PIXEL_RATIO = dpr / bsr;

      window.addEventListener('resize', sizeCanvas);

      function sizeCanvas() {
        var grid = computeGrid(30, 20, 60);
        canvas.width = grid.width; // * PIXEL_RATIO;
        canvas.height = grid.height; // * PIXEL_RATIO;
        canvas.style.width = grid.width + 'px'; // 90%';
        canvas.style.height = grid.height + 'px'; // '90%';
        // ctx.setTransform(PIXEL_RATIO, 0, 0, PIXEL_RATIO, 0, 0);

        drawTest(grid.rows, grid.cols, grid.side);
      }

      function drawTest(rows, cols, side) {
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            ctx.fillStyle = (r + c) % 5 === 0 ? '#ffa62b' : '#1b3a4a';
            ctx.fillRect(c * side, r * side, side, side);
          }
        }
      }

      function computeGrid(minCols, minRows, maxCellSide) {
        var padding = Math.min(window.innerWidth, window.innerHeight) / 12;

        var maxWidth = window.innerWidth - padding;
        var maxHeight = window.innerHeight - padding;

        // Choice of `maxCellSide` as cutoff is arbitrary
        if (maxWidth < maxCellSide || maxHeight < maxCellSide) {
          return {
            cols: 1,
            rows: 1,
            width: maxCellSide,
            height: maxCellSide,
            side: maxCellSide,
          };
        }

        if (
          maxWidth / minCols >= maxCellSide &&
          maxHeight / minRows >= maxCellSide
        ) {
          var cols = Math.floor(maxWidth / maxCellSide);
          var rows = Math.floor(maxHeight / maxCellSide);
          var width = cols * maxCellSide;
          var height = rows * maxCellSide;

          return {
            cols: cols,
            rows: rows,
            width: width,
            height: height,
            side: maxCellSide,
          };
        } else if (maxWidth / maxHeight > minCols / minRows) {
          // Contrained by height
          var side = Math.floor(maxHeight / minRows);
          var height = minRows * side;
          var rows = minRows;
          var cols = Math.floor(maxWidth / side);
          var width = cols * side;

          return {
            cols: cols,
            rows: rows,
            width: width,
            height: height,
            side: side,
          };
        } else {
          // Constrained by width
          var side = Math.floor(maxWidth / minCols);
          var width = minCols * side;
          var cols = minCols;
          var rows = Math.floor(maxHeight / side);
          var height = rows * side;

          return {
            cols: cols,
            rows: rows,
            width: width,
            height: height,
            side: side,
          };
        }
      }

      sizeCanvas();
    </script>
  </body>
</html>
