<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scheme and Variations (1)</title>
    <link rel="stylesheet" href="./common.css" />
  </head>

  <body>
    <header>
      <nav>
        <a href="https://wjlewis.github.io/index.html" target="_blank">
          <img id="icon" src="./assets/sonobe.svg" alt="A Sonobe module" />
        </a>
        <div class="nav-links">
          <button id="theme-toggle">Dark</button>
        </div>
      </nav>
    </header>

    <article>
      <section>
        <h1>Scheme and Variations (1)</h1>
        <h2>A Baseline Evaluator</h2>

        <p>
          <pre><code class="hl-racket">
(define (eval e r)
  (match e
    [else (error (format "unrecognized expression: ~a" e))]))
          </code></pre>
        </p>
      </section>
    </article>

    <footer></footer>

    <script>
      var themeToggle = document.getElementById('theme-toggle');

      themeToggle.addEventListener('click', function () {
        if (document.body.classList.contains('dark')) {
          document.body.classList.remove('dark');
          themeToggle.innerText = 'Dark';
        } else {
          document.body.classList.add('dark');
          themeToggle.innerText = 'Light';
        }
      });
    </script>
    <script src="https://unpkg.com/bootleg-hl"></script>
  </body>
</html>
